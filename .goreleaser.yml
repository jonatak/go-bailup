# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: "baillconnect-to-mqtt"

before:
  hooks:
    - go mod tidy

builds:
  - main: "./cmd/baillconnect-to-mqtt"
    env:
      - CGO_ENABLED=0
    # Same symbols as Makefile GO_LDFLAGS.
    ldflags:
      - -s -w
      - -X github.com/jonatak/baillconnect-to-mqtt/internal/config.Version={{.Version}}
      - -X github.com/jonatak/baillconnect-to-mqtt/internal/config.CommitSHA={{.ShortCommit}}
      - -X github.com/jonatak/baillconnect-to-mqtt/internal/config.BuildTime={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [ "binary" ]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  disable: true  # we let release-please generate the changelog instead
