name: Release Please

'on':
  push:
    branches: [ main ]

jobs:
  track-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.run.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: run
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          manifest-file: .github/.release-please-manifest.json
          config-file: .github/release-please-config.json

  goreleaser:
    if: ${{ needs.track-release.outputs.release_created }}
    needs:
      - track-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-addon-changelog:
    if: ${{ needs.track-release.outputs.release_created }}
    needs:
      - track-release
      - goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync add-on changelog
        run: scripts/sync-addon-changelog.sh

      - name: Commit synced add-on changelog
        run: |
          if git diff --quiet -- baillconnect-to-mqtt/CHANGELOG.md; then
            echo "Add-on changelog already synced"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add baillconnect-to-mqtt/CHANGELOG.md
          git commit -m "chore: sync add-on changelog [skip ci]"
          git push
